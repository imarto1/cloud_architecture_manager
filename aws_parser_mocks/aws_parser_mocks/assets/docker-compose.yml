version: "3.8"

x-localstack: &localstack
  image: localstack/localstack:3.0.0
  environment: &localstack-environment
    SERVICES: s3,ec2,dynamodb,iam,sqs
    DEBUG: "1"
    DOCKER_HOST: unix:///var/run/docker.sock

services:
  web-application:
    <<: *localstack
    ports: ["127.0.0.1:4566:4566"]
    environment: {<<: *localstack-environment, ARCHITECTURE_ID: web-application}
    volumes: [web-application-data:/var/lib/localstack, /var/run/docker.sock:/var/run/docker.sock, ./init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh]
  public-api:
    <<: *localstack
    ports: ["127.0.0.1:4567:4566"]
    environment: {<<: *localstack-environment, ARCHITECTURE_ID: public-api}
    volumes: [public-api-data:/var/lib/localstack, /var/run/docker.sock:/var/run/docker.sock, ./init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh]
  ecommerce:
    <<: *localstack
    ports: ["127.0.0.1:4568:4566"]
    environment: {<<: *localstack-environment, ARCHITECTURE_ID: ecommerce}
    volumes: [ecommerce-data:/var/lib/localstack, /var/run/docker.sock:/var/run/docker.sock, ./init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh]
  real-time-analytics:
    <<: *localstack
    ports: ["127.0.0.1:4569:4566"]
    environment: {<<: *localstack-environment, ARCHITECTURE_ID: real-time-analytics}
    volumes: [real-time-analytics-data:/var/lib/localstack, /var/run/docker.sock:/var/run/docker.sock, ./init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh]
  batch-processing:
    <<: *localstack
    ports: ["127.0.0.1:4570:4566"]
    environment: {<<: *localstack-environment, ARCHITECTURE_ID: batch-processing}
    volumes: [batch-processing-data:/var/lib/localstack, /var/run/docker.sock:/var/run/docker.sock, ./init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh]
  event-processing:
    <<: *localstack
    ports: ["127.0.0.1:4571:4566"]
    environment: {<<: *localstack-environment, ARCHITECTURE_ID: event-processing}
    volumes: [event-processing-data:/var/lib/localstack, /var/run/docker.sock:/var/run/docker.sock, ./init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh]
  media-delivery:
    <<: *localstack
    ports: ["127.0.0.1:4572:4566"]
    environment: {<<: *localstack-environment, ARCHITECTURE_ID: media-delivery}
    volumes: [media-delivery-data:/var/lib/localstack, /var/run/docker.sock:/var/run/docker.sock, ./init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh]
  internal-tool:
    <<: *localstack
    ports: ["127.0.0.1:4573:4566"]
    environment: {<<: *localstack-environment, ARCHITECTURE_ID: internal-tool}
    volumes: [internal-tool-data:/var/lib/localstack, /var/run/docker.sock:/var/run/docker.sock, ./init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh]
  iot-ingestion:
    <<: *localstack
    ports: ["127.0.0.1:4574:4566"]
    environment: {<<: *localstack-environment, ARCHITECTURE_ID: iot-ingestion}
    volumes: [iot-ingestion-data:/var/lib/localstack, /var/run/docker.sock:/var/run/docker.sock, ./init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh]
  ml-inference:
    <<: *localstack
    ports: ["127.0.0.1:4575:4566"]
    environment: {<<: *localstack-environment, ARCHITECTURE_ID: ml-inference}
    volumes: [ml-inference-data:/var/lib/localstack, /var/run/docker.sock:/var/run/docker.sock, ./init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh]

volumes:
  web-application-data:
  public-api-data:
  ecommerce-data:
  real-time-analytics-data:
  batch-processing-data:
  event-processing-data:
  media-delivery-data:
  internal-tool-data:
  iot-ingestion-data:
  ml-inference-data:
